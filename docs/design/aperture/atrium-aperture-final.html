<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Atrium · Aperture (tweakable)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@300;400;450;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; background: #1a1816; }
  body { font-family: "Inter Tight", system-ui, sans-serif; color: #1a1816; -webkit-font-smoothing: antialiased; font-feature-settings: "ss01", "cv11"; }
  *, *::before, *::after { box-sizing: border-box; }
  :root {
    --display: "Inter Tight", system-ui, sans-serif;
    --ui: "Inter Tight", system-ui, sans-serif;
    --mono: "IBM Plex Mono", ui-monospace, monospace;
  }
  body :is(.dc-toolbar, .dc-section-title, .dc-artboard-label) { font-family: var(--ui); letter-spacing: 0; font-style: normal !important; }
  .ab, .ab * { font-style: normal !important; }
  .ab p, .ab h1, .ab h2, .ab h3, .ab h4, .ab h5, .ab ul, .ab ol { margin: 0; padding: 0; }
  .ab ul, .ab ol { list-style: none; }
  .ab button { font: inherit; color: inherit; background: none; border: 0; padding: 0; cursor: pointer; }
  .ab svg { display: block; }
  /* Inject the hybridLandingCss + .va styles by importing the original module — it injects on render. */
</style>
</head>
<body>
<template id="__bundler_thumbnail">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <rect width="100" height="100" fill="#f4f1ec"/>
    <circle cx="50" cy="50" r="22" fill="none" stroke="#3b5680" stroke-width="3"/>
    <text x="50" y="56" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="500" fill="#1a1816" letter-spacing="-0.5">tweak</text>
  </svg>
</template>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="atrium-hybrid-departments.jsx"></script>
<script type="text/babel" src="atrium-aperture-tweakable.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "brand": "legalOS",
  "userName": "Jola Okafor",
  "userInitials": "JO",
  "userRole": "Counsel · Commercial",
  "greeting": "Good morning, Jola. **Two redlines** are waiting on you.",
  "subline": "Eight agents are working across eight departments. Pick a department to pivot in, or jump straight to a pinned matter.",
  "agentsRunning": 8,
  "dateLine": "Friday · May 1",
  "inboxCount": 14,
  "statOpen": "23",
  "statSLA": "2",
  "statSaved": "142h",
  "departments": [
    { "name": "Commercial", "desc": "sell-side, buy-side, NDAs", "count": 12, "savedH": 142 },
    { "name": "Public Sector", "desc": "government relations, regulatory affairs, public sector commercial", "count": 2, "savedH": 18 },
    { "name": "Mergers & Acquisitions", "desc": "[ description ]", "count": 4, "savedH": 88 },
    { "name": "Privacy", "desc": "[ description ]", "count": 6, "savedH": 64 },
    { "name": "Product", "desc": "[ description ]", "count": 5, "savedH": 52 },
    { "name": "Compliance", "desc": "[ description ]", "count": 4, "savedH": 38 },
    { "name": "Operations", "desc": "[ description ]", "count": 3, "savedH": 22 },
    { "name": "General Tools", "desc": "[ description ]", "count": 0, "savedH": 0 }
  ]
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

  const updateDept = (i, key, value) => {
    const next = tweaks.departments.map((d, idx) => idx === i ? { ...d, [key]: value } : d);
    setTweak('departments', next);
  };

  return (
    <>
      <DesignCanvas
        title="Atrium · Aperture (tweakable)"
        subtitle="Open Tweaks (toolbar toggle, top right) to edit copy, departments, and stats. Use **bold** in the greeting to highlight phrases."
      >
        <DCSection id="aperture" title="Aperture">
          <DCArtboard id="va-aperture" label="Aperture · live tweakable" width={1440} height={900}>
            <ApertureTweakable tweaks={tweaks} setTweak={setTweak}/>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>

      <TweaksPanel title="Tweaks">
        <TweakSection title="Brand & user">
          <TweakText label="Brand" value={tweaks.brand} onChange={(v)=>setTweak('brand',v)}/>
          <TweakText label="Your name" value={tweaks.userName} onChange={(v)=>setTweak('userName',v)}/>
          <TweakText label="Initials (avatar)" value={tweaks.userInitials} onChange={(v)=>setTweak('userInitials',v)}/>
          <TweakText label="Role / title" value={tweaks.userRole} onChange={(v)=>setTweak('userRole',v)}/>
        </TweakSection>

        <TweakSection title="Hero copy">
          <TweakText label="Greeting (use **bold** for accent)" value={tweaks.greeting} onChange={(v)=>setTweak('greeting',v)}/>
          <TweakText label="Subline" value={tweaks.subline} onChange={(v)=>setTweak('subline',v)}/>
        </TweakSection>

        <TweakSection title="Top bar & stats">
          <TweakNumber label="Agents running" value={tweaks.agentsRunning} onChange={(v)=>setTweak('agentsRunning',v)}/>
          <TweakText label="Date line" value={tweaks.dateLine} onChange={(v)=>setTweak('dateLine',v)}/>
          <TweakNumber label="Inbox count" value={tweaks.inboxCount} onChange={(v)=>setTweak('inboxCount',v)}/>
          <TweakText label="Stat — Open" value={tweaks.statOpen} onChange={(v)=>setTweak('statOpen',v)}/>
          <TweakText label="Stat — SLA at risk" value={tweaks.statSLA} onChange={(v)=>setTweak('statSLA',v)}/>
          <TweakText label="Stat — Saved · MTD" value={tweaks.statSaved} onChange={(v)=>setTweak('statSaved',v)}/>
        </TweakSection>

        {tweaks.departments.map((d, i) => (
          <TweakSection key={i} title={`Dept ${i+1} · ${d.name}`}>
            <TweakText label="Name" value={d.name} onChange={(v)=>updateDept(i,'name',v)}/>
            <TweakText label="Description" value={d.desc} onChange={(v)=>updateDept(i,'desc',v)}/>
            <TweakNumber label="Matters count" value={d.count} onChange={(v)=>updateDept(i,'count',v)}/>
            <TweakNumber label="Hours saved" value={d.savedH} onChange={(v)=>updateDept(i,'savedH',v)}/>
          </TweakSection>
        ))}
      </TweaksPanel>
    </>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
